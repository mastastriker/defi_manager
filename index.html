<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeFi Depot Verwaltung</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <main class="app-shell">
      <section id="auth-view" class="card">
        <h1>DeFi Depot Verwaltung</h1>
        <p class="muted">Bitte einloggen, um deine Depots zu verwalten.</p>

        <div id="auth-mode-tabs" class="row gap">
          <button
            id="show-login-btn"
            class="btn-secondary"
            type="button"
            onclick="document.getElementById('login-form').classList.remove('hidden');document.getElementById('register-form').classList.add('hidden');"
          >
            Login
          </button>
          <button
            id="show-register-btn"
            class="btn-secondary"
            type="button"
            onclick="document.getElementById('register-form').classList.remove('hidden');document.getElementById('login-form').classList.add('hidden');"
          >
            Registrieren
          </button>
        </div>

        <form id="login-form" class="stack">
          <label>Email <input id="login-email" type="email" required /></label>
          <label>Passwort <input id="login-password" type="password" minlength="6" required /></label>
          <button class="btn-primary" type="submit">Login</button>
          <button id="forgot-password-btn" class="btn-link" type="button">Passwort vergessen</button>
        </form>

        <form id="register-form" class="stack hidden">
          <label>Email <input id="register-email" type="email" required /></label>
          <label>Passwort <input id="register-password" type="password" minlength="6" required /></label>
          <label>Passwort bestätigen <input id="register-password-confirm" type="password" minlength="6" required /></label>
          <button class="btn-primary" type="submit">Registrieren</button>
        </form>

        <p id="auth-status" class="status" role="status" aria-live="polite"></p>
      </section>

      <section id="app-view" class="hidden">
        <header class="topbar">
          <div>
            <h1>Depots</h1>
            <p id="user-email" class="muted"></p>
          </div>
          <button id="logout-btn" class="btn-secondary" type="button">Logout</button>
        </header>

        <section class="card stack">
          <div class="row wrap gap">
            <label>
              Depot-Auswahl
              <select id="portfolio-select"></select>
            </label>
            <button id="new-portfolio-btn" class="btn-primary" type="button">Neues Depot</button>
            <button id="new-wallet-btn" class="btn-secondary" type="button">Wallet hinzufügen</button>
          </div>

          <div class="kpi-grid">
            <article><p>Gesamtwert</p><strong id="kpi-total">$0.00</strong></article>
            <article><p>Portfolio Summe</p><strong id="kpi-portfolio-count">0</strong></article>
            <article><p>Wallets</p><strong id="kpi-wallet-count">0</strong></article>
            <article><p>Positionen</p><strong id="kpi-position-count">0</strong></article>
          </div>

          <p id="app-status" class="status" role="status" aria-live="polite"></p>
        </section>

        <section id="portfolio-sections" class="stack"></section>
      </section>
    </main>

    <dialog id="portfolio-dialog">
      <form id="portfolio-form" method="dialog" class="stack">
        <h2>Neues Depot</h2>
        <label>Name <input id="portfolio-name" type="text" required /></label>
        <div class="row gap">
          <button class="btn-primary" value="submit" type="submit">Erstellen</button>
          <button class="btn-secondary" value="cancel" type="button" id="portfolio-cancel">Abbrechen</button>
        </div>
      </form>
    </dialog>

    <dialog id="wallet-dialog">
      <form id="wallet-form" method="dialog" class="stack">
        <h2>Neue Wallet</h2>
        <label>Name <input id="wallet-name" type="text" required /></label>
        <label>
          Depot
          <select id="wallet-portfolio-select" required></select>
        </label>
        <div class="row gap">
          <button class="btn-primary" value="submit" type="submit">Erstellen</button>
          <button class="btn-secondary" value="cancel" type="button" id="wallet-cancel">Abbrechen</button>
        </div>
      </form>
    </dialog>

    <dialog id="position-dialog">
      <form id="position-form" method="dialog" class="stack">
        <h2 id="position-dialog-title">Position hinzufügen</h2>
        <input id="position-id" type="hidden" />
        <input id="position-wallet-id" type="hidden" />
        <label>Asset <input id="position-asset" type="text" required /></label>
        <label>Amount <input id="position-amount" type="number" step="0.00000001" min="0" required /></label>
        <label>Value USD <input id="position-value" type="number" step="0.01" min="0" required /></label>
        <div class="row gap">
          <button class="btn-primary" value="submit" type="submit">Speichern</button>
          <button class="btn-secondary" value="cancel" type="button" id="position-cancel">Abbrechen</button>
        </div>
      </form>
    </dialog>

    <script src="supabase-config.local.js"></script>
    <script src="app.js"></script>
  </body>
</html>
