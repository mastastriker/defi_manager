<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeFi-Portfolio-Manager | Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-a" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-b" aria-hidden="true"></div>

    <main class="shell" style="max-width: 560px; padding-top: 3rem">
      <section id="auth-gate" class="panel" style="margin-bottom: 0.9rem">
        <h1>Login</h1>
        <p class="meta-note">Melde dich an, um zum Dashboard zu gelangen.</p>
        <div style="display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:.6rem;">
          <button id="show-login-btn" type="button" class="btn-primary">Login</button>
          <button id="show-register-btn" type="button" class="wallet-action-btn">Registrieren</button>
        </div>
        <form id="login-form" class="wallet-form">
          <label>Email<input id="login-email" type="email" required /></label>
          <label>Passwort<input id="login-password" type="password" minlength="6" required /></label>
          <button type="submit" class="btn-primary">Einloggen</button>
        </form>
        <form id="register-form" class="wallet-form" style="display:none;">
          <label>Email<input id="register-email" type="email" required /></label>
          <label>Passwort<input id="register-password" type="password" minlength="6" required /></label>
          <button type="submit" class="btn-primary">Registrieren</button>
        </form>
        <p id="auth-status" class="form-status" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.local.js"></script>
    <script>
      (function () {
        const loginForm = document.getElementById("login-form");
        const registerForm = document.getElementById("register-form");
        const showLoginBtn = document.getElementById("show-login-btn");
        const showRegisterBtn = document.getElementById("show-register-btn");
        const authStatus = document.getElementById("auth-status");

        function setStatus(message, isError) {
          if (!authStatus) return;
          authStatus.textContent = message || "";
          authStatus.style.color = isError ? "#ffb4b4" : "#bdd8ff";
        }

        function readConfig() {
          const cfg = window.__DEFI_MANAGER_CONFIG__ || {};
          return {
            url: cfg.supabaseUrl || window.NEXT_PUBLIC_SUPABASE_URL || window.PAPERCLIP_SUPABASE_URL || "",
            anonKey: cfg.supabaseAnonKey || window.NEXT_PUBLIC_SUPABASE_ANON_KEY || window.PAPERCLIP_SUPABASE_ANON_KEY || ""
          };
        }

        const config = readConfig();
        if (!config.url || !config.anonKey || !window.supabase?.createClient) {
          setStatus("Supabase Konfiguration fehlt. Bitte supabase-config.local.js prüfen.", true);
          return;
        }

        const client = window.supabase.createClient(config.url, config.anonKey);

        client.auth.getSession().then(function ({ data, error }) {
          if (error) {
            setStatus(error.message, true);
            return;
          }
          if (data?.session?.user) {
            window.location.href = "/dashboard.html";
          }
        });

        showLoginBtn?.addEventListener("click", function () {
          if (loginForm) loginForm.style.display = "";
          if (registerForm) registerForm.style.display = "none";
        });

        showRegisterBtn?.addEventListener("click", function () {
          if (registerForm) registerForm.style.display = "";
          if (loginForm) loginForm.style.display = "none";
        });

        loginForm?.addEventListener("submit", async function (event) {
          event.preventDefault();
          const email = document.getElementById("login-email")?.value?.trim() || "";
          const password = document.getElementById("login-password")?.value || "";
          const { error } = await client.auth.signInWithPassword({ email, password });
          if (error) {
            setStatus(error.message, true);
            return;
          }
          window.location.href = "/dashboard.html";
        });

        registerForm?.addEventListener("submit", async function (event) {
          event.preventDefault();
          const email = document.getElementById("register-email")?.value?.trim() || "";
          const password = document.getElementById("register-password")?.value || "";
          const { error } = await client.auth.signUp({ email, password });
          if (error) {
            setStatus(error.message, true);
            return;
          }
          setStatus("Registrierung erfolgreich. Bitte jetzt einloggen.", false);
          if (loginForm) loginForm.style.display = "";
          if (registerForm) registerForm.style.display = "none";
        });
      })();
    </script>
  </body>
</html>
